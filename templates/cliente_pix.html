{% extends "base_cliente.html" %}
{% block titulo %}PIX do Pedido{% endblock %}
{% block conteudo %}
<div class="card">
    <h2>Pagamento do Pedido via PIX</h2>
    <p><strong>Cliente:</strong> {{ cliente.nome }}</p>
    <p><strong>Pedido:</strong> #{{ pedido.id }}</p>
    <p><strong>Valor:</strong> R$ {{ "%.2f"|format(valor_aberto or 0) }}</p>
</div>

<div class="card" style="text-align:center;">
    <h3>QR Code PIX</h3>
    <img src="data:image/png;base64,{{ qr_code_base64 }}" alt="QR Code PIX" style="max-width:300px; width:100%;">
</div>

<div class="card">
    <h3>PIX Copia e Cola</h3>
    <textarea id="pixCode" readonly style="height:120px;">{{ payload_pix }}</textarea>
    <button type="button" onclick="copiarPix()">Copiar código PIX</button>
</div>

<script>
function copiarPix() {
    const campo = document.getElementById('pixCode');
    campo.select();
    campo.setSelectionRange(0, 99999);
    document.execCommand('copy');
    alert('Código PIX copiado com sucesso!');
}
</script>
{% endblock %}
