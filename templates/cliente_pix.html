{% extends "base_cliente.html" %}
{% block conteudo %}
<div class="hero"><div><h2>Pagamento via PIX</h2><p>Escaneie o QR Code ou copie o código para pagar seu pedido.</p></div><span class="pill success">PIX</span></div>
<div class="resumo-grid">
    <div class="resumo-item"><h3>Pedido</h3><p>#{{ pedido.id }}</p></div>
    <div class="resumo-item"><h3>Valor</h3><p>R$ {{ "%.2f"|format(valor_aberto or 0) }}</p></div>
</div>
<div class="card" style="text-align:center;">
    <p class="muted">Escaneie o QR Code</p>
    <img src="data:image/png;base64,{{ qr_code_base64 }}" class="img-fluid" style="max-width:260px; width:100%; height:auto;">
</div>
<div class="card">
    <label style="font-weight:700; display:block; margin-bottom:8px;">Código PIX copia e cola</label>
    <textarea id="pixCode" rows="4" readonly>{{ payload_pix }}</textarea>
    <div class="actions-inline" style="margin-top:12px;">
        <button type="button" class="btn" onclick="copiarPix()">Copiar código PIX</button>
        <form method="POST" action="{{ url_for('cliente_confirmar_pix', venda_id=pedido.id) }}">
            <button class="btn btn-success" type="submit">Já fiz o pagamento</button>
        </form>
    </div>
    <div id="msgCopiado" class="muted" style="margin-top:8px; display:none;">Código copiado!</div>
</div>
<script>
function copiarPix(){
  const campo=document.getElementById('pixCode');
  campo.select();
  campo.setSelectionRange(0,99999);
  document.execCommand('copy');
  document.getElementById('msgCopiado').style.display='block';
}
</script>
{% endblock %}
