{% extends "base_cliente.html" %}

{% block conteudo %}
<div class="container py-4">

    <div class="text-center mb-4">
        <h4>Pagamento via PIX</h4>
        <p class="text-muted">Finalize seu pagamento com segurança</p>
    </div>

    <!-- VALOR -->
    <div class="card shadow-sm text-center mb-4">
        <div class="card-body">
            <div class="text-muted small">Valor a pagar</div>
            <h2 class="text-success">R$ {{ "%.2f"|format(valor or 0) }}</h2>
        </div>
    </div>

    <!-- QR CODE -->
    <div class="card shadow-sm text-center mb-4">
        <div class="card-body">
            <p class="mb-2">Escaneie o QR Code</p>
            <img src="data:image/png;base64,{{ qr_code }}" class="img-fluid" style="max-width:250px;">
        </div>
    </div>

    <!-- COPIA E COLA -->
    <div class="card shadow-sm mb-4">
        <div class="card-body text-center">

            <p class="mb-2">Ou copie o código PIX:</p>

            <textarea id="pixCode" class="form-control mb-2" rows="3">{{ payload_pix }}</textarea>

            <button onclick="copiarPix()" class="btn btn-primary w-100">
                Copiar código PIX
            </button>

            <small id="msgCopiado" class="text-success d-none">
                Código copiado!
            </small>

        </div>
    </div>

    <!-- AÇÕES -->
    <div class="card shadow-sm">
        <div class="card-body text-center">

            <p class="mb-3">Após o pagamento, clique abaixo:</p>

            <form method="POST" action="{{ url_for('cliente_confirmar_pix', venda_id=venda_id) }}">
                <button class="btn btn-success w-100">
                    Já fiz o pagamento
                </button>
            </form>

        </div>
    </div>

</div>

<script>
function copiarPix() {
    const campo = document.getElementById("pixCode");
    campo.select();
    campo.setSelectionRange(0, 99999);

    document.execCommand("copy");

    document.getElementById("msgCopiado").classList.remove("d-none");
}
</script>

{% endblock %}
