{% extends 'base.html' %}
{% block conteudo %}

<h2>📥 Entrada de Estoque</h2>

<form method="POST">
    <label>Produto</label>
    <select name="produto" required>
        {% for p in produtos %}
        <option value="{{ p.id }}">
            {{ p.nome }} - Estoque atual: {{ p.estoque }}
        </option>
        {% endfor %}
    </select>

    <label>Quantidade</label>
    <input type="number" name="quantidade" min="1" required>

    <button type="submit">Adicionar ao Estoque</button>
</form>

{% endblock %}
