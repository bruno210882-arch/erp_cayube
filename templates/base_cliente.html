<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block titulo %}Área do Cliente{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="manifest" href="/manifest-cliente.webmanifest">
    <meta name="theme-color" content="#1e1e2f">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/cliente-erp-192.png') }}">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .topo {
            background: #1e1e2f;
            color: white;
            padding: 15px;
        }

        .menu {
            background: white;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .menu a {
            text-decoration: none;
            color: #1e1e2f;
            font-weight: bold;
        }

        .menu button {
            margin-left: auto;
            background: #198754;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            padding: 10px 14px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="topo">
    <h2>Área do Cliente</h2>
</div>

<div class="menu">
    <a href="{{ url_for('cliente_dashboard') }}">Início</a>
    <a href="{{ url_for('cliente_estoque') }}">Estoque</a>
    <a href="{{ url_for('cliente_pedido') }}">Fazer Pedido</a>
    <a href="{{ url_for('cliente_historico') }}">Histórico</a>
    <a href="{{ url_for('cliente_itens_em_aberto') }}">Itens em Aberto</a>
    <a href="{{ url_for('cliente_pix') }}">Pagar Pedido</a>
    <a href="{{ url_for('cliente_pix_divida') }}">PIX em Aberto</a>
    <a href="{{ url_for('cliente_logout') }}">Sair</a>
    <button id="btnInstalarApp">📲 Instalar App</button>
</div>

<div class="container">
    {% block conteudo %}{% endblock %}
</div>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/cliente-sw.js", { scope: "/cliente/" });
}

let deferredPrompt = null;
const installBtn = document.getElementById("btnInstalarApp");

window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
});

installBtn.addEventListener("click", async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
    } else {
        alert("Use o menu do navegador e escolha 'Adicionar à tela inicial'.");
    }
});
</script>

</body>
</html>
