<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block titulo %}Área do Cliente{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest-cliente.webmanifest">
    <meta name="theme-color" content="#132238">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/cliente-erp-192.png') }}">
    <style>
        *{box-sizing:border-box}:root{--bg:#f4f7fb;--card:#fff;--text:#1b2330;--muted:#667085;--line:#e6ebf2;--primary:#1d4ed8;--secondary:#0f766e;--shadow:0 18px 36px rgba(15,23,42,.08);--radius:22px}
        body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#eef4ff 0,#f5f8fc 38%,#f4f7fb 100%);color:var(--text)}
        .topo{background:linear-gradient(135deg,#101828,#1d4ed8 58%,#0891b2);color:#fff;padding:24px 18px 88px}
        .topo-inner{max-width:1180px;margin:0 auto;display:flex;justify-content:space-between;gap:18px;align-items:center;flex-wrap:wrap}
        .brand{display:flex;align-items:center;gap:14px}.brand-logo{width:60px;height:60px;background:rgba(255,255,255,.12);border-radius:18px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.18);overflow:hidden}.brand-logo img{width:100%;height:100%;object-fit:contain;padding:8px}.brand h2{margin:0;font-size:28px}.brand p{margin:6px 0 0;opacity:.85}
        .shell{max-width:1180px;margin:-58px auto 0;padding:0 18px 32px}
        .menu-wrap{background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border:1px solid rgba(226,232,240,.9);box-shadow:var(--shadow);padding:14px;border-radius:24px}
        .menu{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.menu a,.menu button{padding:11px 15px;border-radius:14px;border:1px solid transparent;background:#fff;color:var(--text);font-weight:700;cursor:pointer;text-decoration:none}.menu a:hover,.menu button:hover{background:#eff6ff;border-color:#dbeafe}.menu .install{margin-left:auto;background:linear-gradient(135deg,#166534,#22c55e);color:#fff;box-shadow:0 10px 20px rgba(34,197,94,.2)}
        .container{padding:22px 0}.hero{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:22px}.hero h1,.hero h2{margin:0;font-size:30px}.hero p{margin:8px 0 0;color:var(--muted)}
        .card{background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:var(--radius);padding:22px;margin-bottom:18px}
        .resumo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}.resumo-item{background:linear-gradient(180deg,#fff 0,#f8fbff 100%);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:var(--shadow)}.resumo-item h3{margin:0 0 10px;color:var(--muted);font-size:14px;text-transform:uppercase}.resumo-item p{margin:0;font-size:28px;font-weight:800}
        table{width:100%;border-collapse:separate;border-spacing:0 10px} th{font-size:12px;text-transform:uppercase;color:var(--muted);text-align:left;padding:0 14px 8px} td{background:#fff;padding:14px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)} td:first-child{border-left:1px solid var(--line);border-radius:14px 0 0 14px} td:last-child{border-right:1px solid var(--line);border-radius:0 14px 14px 0}
        input,select,textarea{width:100%;padding:13px 14px;border:1px solid #d7dfec;border-radius:14px;font-size:15px}.field{margin-bottom:14px}.field label{display:block;margin-bottom:7px;font-weight:700}.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 18px;border:none;border-radius:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,#1d4ed8,#0891b2);cursor:pointer;box-shadow:0 10px 22px rgba(29,78,216,.2)} .btn-secondary{background:#fff;color:var(--text);border:1px solid var(--line);box-shadow:none}
        .empty-state{padding:26px;border:1px dashed #cbd5e1;border-radius:18px;background:#f8fbff;color:var(--muted);text-align:center;overflow:auto}
        .pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-weight:700;font-size:12px}.pill.success{background:#ecfdf3;color:#166534}.pill.warning{background:#fff7ed;color:#c2410c}
        .table-wrap{overflow:auto}
        @media (max-width:760px){.topo{padding-bottom:78px}.menu .install{margin-left:0}.hero h1,.hero h2{font-size:24px}}
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
<div class="topo">
    <div class="topo-inner">
        <div class="brand">
            <div class="brand-logo"><img src="{{ url_for('static', filename='logo.png') }}" alt="Logo Cayube"></div>
            <div>
                <h2>Área do Cliente</h2>
                <p>Veja apenas seus pedidos, histórico, pagamentos e pendências.</p>
            </div>
        </div>
        <span class="pill">Acesso individual</span>
    </div>
</div>
<div class="shell">
    <div class="menu-wrap">
        <div class="menu">
            <a href="{{ url_for('cliente_dashboard') }}">Início</a>
            <a href="{{ url_for('cliente_estoque') }}">Estoque</a>
            <a href="{{ url_for('cliente_pedido') }}">Pedidos</a>
            <a href="{{ url_for('cliente_historico') }}">Histórico</a>
            <a href="{{ url_for('cliente_itens_em_aberto') }}">Em Aberto</a>
            <a href="{{ url_for('cliente_pix') }}">Pagar Pedido</a>
            <a href="{{ url_for('cliente_pix_divida') }}">PIX em Aberto</a>
            <a href="{{ url_for('cliente_notificacoes') }}">Notificações</a>
            <a href="{{ url_for('cliente_logout') }}">Sair</a>
            <button id="btnInstalarApp" class="install">📲 Instalar App</button>
        </div>
    </div>
    <div class="container">{% block conteudo %}{% endblock %}</div>
</div>
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/cliente-sw.js", { scope: "/cliente/" });
}
let deferredPrompt = null;
const installBtn = document.getElementById("btnInstalarApp");
window.addEventListener("beforeinstallprompt", (e) => { e.preventDefault(); deferredPrompt = e; });
installBtn?.addEventListener("click", async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
    } else {
        alert("Use o menu do navegador e escolha 'Adicionar à tela inicial'.");
    }
});
</script>
</body>
</html>
