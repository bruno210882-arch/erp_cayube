{% extends "base_cliente.html" %}
{% block conteudo %}

<h2>Pagamento de Valores em Aberto</h2>

<div class="card">
    <p><strong>Cliente:</strong> {{ cliente.nome }}</p>
    <p><strong>Total em aberto:</strong> R$ {{ "%.2f"|format(valor_aberto) }}</p>
</div>

<div class="card" style="text-align:center;">
    <h3>QR Code PIX</h3>
    <img src="data:image/png;base64,{{ qr_code_base64 }}" alt="QR Code PIX" style="max-width:300px; width:100%;">
</div>

<div class="card">
    <h3>PIX Copia e Cola</h3>
    <textarea id="pixCode" readonly style="width:100%; height:120px;">{{ payload_pix }}</textarea>
    <br><br>
    <button onclick="copiarPix()">Copiar código PIX</button>
</div>

<script>
function copiarPix() {
    const campo = document.getElementById("pixCode");
    campo.select();
    campo.setSelectionRange(0, 99999);
    document.execCommand("copy");
    alert("Código PIX copiado com sucesso!");
}
</script>

{% endblock %}
