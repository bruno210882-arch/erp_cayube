<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ERP Cayube</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

/* MENU */
.sidebar {
    width: 230px;
    height: 100vh;
    background: linear-gradient(180deg, #1e1e2f, #2c2c3e);
    position: fixed;
}

.sidebar h2 {
    color: #fff;
    text-align: center;
    padding: 20px;
}

.sidebar a {
    display: block;
    padding: 12px 20px;
    color: #bbb;
    text-decoration: none;
}

.sidebar a:hover {
    background: #00c853;
    color: #fff;
}

/* CONTEÚDO */
.content {
    margin-left: 230px;
    padding: 25px;
}

/* CARD */
.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* FORM */
input, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* BOTÃO */
button {
    background: #00c853;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #009624;
}

/* TABELA */
table {
    width: 100%;
    margin-top: 15px;
    border-collapse: collapse;
}

table th {
    background: #00c853;
    color: white;
}

table th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}
</style>
</head>
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="theme-color" content="#1e1e2f">
<body>

<div style="
    display:flex;
    align-items:center;
    gap:15px;
    background:#1e1e2f;
    padding:15px;
    color:white;
    border-radius:10px;
">
    
    <img src="{{ url_for('static', filename='logo.png') }}" 
         style="height:60px; border-radius:8px;">

    <h1 style="margin:0;">Cayube Cocadas e Doces</h1>

</div>

    <a href="{{ url_for('index') }}">🏠 Início</a>
    <a href="{{ url_for('clientes') }}">👥 Clientes</a>
    <a href="{{ url_for('produtos') }}">📦 Produtos</a>
    <a href="{{ url_for('venda') }}">🛒 Venda</a>
    <a href="{{ url_for('fiado') }}">💳 Fiado</a>
    <a href="{{ url_for('movimentacao') }}">💰 Caixa</a>
    <a href="{{ url_for('entrada_estoque') }}">📥 Entrada Estoque</a>
    <a href="{{ url_for('relatorio_financeiro') }}">📊 Financeiro</a>
    <a href="{{ url_for('relatorio_estoque') }}">📦 Estoque</a>
    <a href="{{ url_for('relatorio_lucro') }}">💸 Lucro</a>
</div>

<div class="content">
    <div class="card">
        {% block conteudo %}
        {% endblock %}
    </div>
</div>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js')
    .then(() => console.log('App pronto'))
}
</script>
</body>
</html>
