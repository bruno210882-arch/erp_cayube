{% extends "base.html" %}
{% block conteudo %}

<h2>Editar Cliente</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div style="
                padding: 12px;
                border-radius: 8px;
                margin-bottom: 15px;
                background:
                    {% if category == 'success' %}#d4edda
                    {% elif category == 'danger' %}#f8d7da
                    {% elif category == 'warning' %}#fff3cd
                    {% else %}#d1ecf1{% endif %};
                color:
                    {% if category == 'success' %}#155724
                    {% elif category == 'danger' %}#721c24
                    {% elif category == 'warning' %}#856404
                    {% else %}#0c5460{% endif %};
            ">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

<div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 700px;">
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label for="nome"><strong>Nome</strong></label>
            <input
                type="text"
                id="nome"
                name="nome"
                value="{{ cliente.nome }}"
                required
                style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px;"
            >
        </div>

        <div style="margin-bottom: 15px;">
            <label for="telefone"><strong>Telefone</strong></label>
            <input
                type="text"
                id="telefone"
                name="telefone"
                value="{% if cliente.telefone and cliente.telefone|length == 11 %}({{ cliente.telefone[:2] }}) {{ cliente.telefone[2:7] }}-{{ cliente.telefone[7:] }}{% else %}{{ cliente.telefone or '' }}{% endif %}"
                maxlength="15"
                placeholder="(19) 99999-9999"
                style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px;"
            >
        </div>

        <div style="margin-bottom: 15px;">
            <label for="local"><strong>Local</strong></label>
            <input
                type="text"
                id="local"
                name="local"
                value="{{ cliente.local or '' }}"
                style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px;"
            >
        </div>

        <div style="display: flex; gap: 10px;">
            <button
                type="submit"
                style="background: #1e1e2f; color: white; border: none; padding: 12px 18px; border-radius: 8px; cursor: pointer;"
            >
                Salvar Alterações
            </button>

            <a
                href="{{ url_for('clientes') }}"
                style="display: inline-block; padding: 12px 18px; background: #6c757d; color: white; text-decoration: none; border-radius: 8px;"
            >
                Voltar
            </a>
        </div>
    </form>
</div>

<script>
    const telefoneInput = document.getElementById("telefone");

    if (telefoneInput) {
        telefoneInput.addEventListener("input", function (e) {
            let v = e.target.value.replace(/\D/g, "");

            if (v.length > 11) {
                v = v.slice(0, 11);
            }

            if (v.length >= 11) {
                v = v.replace(/^(\d{2})(\d{5})(\d{4}).*/, "($1) $2-$3");
            } else if (v.length >= 7) {
                v = v.replace(/^(\d{2})(\d{5})/, "($1) $2");
            } else if (v.length >= 3) {
                v = v.replace(/^(\d{2})(\d+)/, "($1) $2");
            } else if (v.length > 0) {
                v = v.replace(/^(\d+)/, "($1");
            }

            e.target.value = v;
        });
    }
</script>

{% endblock %}
