{% extends "base_cliente.html" %}
{% block conteudo %}

<div class="card">
    <h2>Produtos disponíveis</h2>

    <table>
        <tr>
            <th>Produto</th>
            <th>Preço</th>
            <th>Estoque</th>
        </tr>

        {% for produto in produtos %}
        <tr>
            <td>{{ produto.nome }}</td>
            <td>R$ {{ "%.2f"|format(produto.preco) }}</td>
            <td>{{ produto.estoque }}</td>
        </tr>
        {% else %}
        <tr>
            <td colspan="3">Nenhum produto disponível.</td>
        </tr>
        {% endfor %}
    </table>
</div>

{% endblock %}
