{% extends "base.html" %}
{% block conteudo %}

<h2>Produtos</h2>

<input type="text" id="busca" placeholder="Buscar produto..." class="input-busca">

<table class="tabela">
<tr>
<th>Nome</th>
<th>Preço</th>
<th>Estoque</th>
</tr>

{% for p in produtos %}
<tr class="linha-busca">
<td>{{ p.nome }}</td>
<td>R$ {{ "%.2f"|format(p.preco) }}</td>
<td>{{ p.estoque }}</td>
</tr>
{% endfor %}

</table>

{% include "busca_script.html" %}

{% endblock %}
