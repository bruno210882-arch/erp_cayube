{% extends 'base.html' %}
{% block conteudo %}

<h2>📦 Produtos</h2>

<form method="POST" action="{{ url_for('add_produto') }}">
    <label>Nome</label>
    <input type="text" name="nome" required>

    <label>Preço</label>
    <input type="number" step="0.01" name="preco" required>

    <label>Custo</label>
    <input type="number" step="0.01" name="custo" required>

    <label>Estoque</label>
    <input type="number" name="estoque" required>

    <button type="submit">Cadastrar Produto</button>
</form>

<h3>Lista de Produtos</h3>

<table>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Preço</th>
        <th>Custo</th>
        <th>Estoque</th>
    </tr>

    {% for p in produtos %}
    <tr>
        <td>{{ p.id }}</td>
        <td>{{ p.nome }}</td>
        <td>R$ {{ "%.2f"|format(p.preco) }}</td>
        <td>R$ {{ "%.2f"|format(p.custo) }}</td>
        <td>{{ p.estoque }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
