{% extends 'base.html' %}

{% block conteudo %}

<h2>📦 Produtos</h2>

<form method="POST" action="/add_produto">

    <input type="text" name="nome" placeholder="Nome do produto" required>
    <input type="number" step="0.01" name="preco" placeholder="Preço de venda" required>
    <input type="number" step="0.01" name="custo" placeholder="Custo de entrada" required>
    <input type="number" name="estoque" placeholder="Estoque inicial" required>
    <button type="submit">Cadastrar Produto</button>

</form>

<hr>

<table>
<tr>
    <th>Nome</th>
    <th>Preço</th>
    <th>Custo</th>
    <th>Estoque</th>
</tr>

{% for p in produtos %}
<tr>
    <td>{{ p.nome }}</td>
    <td>R$ {{ "%.2f"|format(p.preco) }}</td>
    <td>R$ {{ "%.2f"|format(p.custo or 0) }}</td>
    <td>{{ p.estoque }}</td>
</tr>
{% endfor %}
</table>

{% endblock %}
