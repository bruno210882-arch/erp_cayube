{% extends 'base.html' %}
{% block conteudo %}

<h2>Clientes</h2>

<form method="POST" action="{{ url_for('add_cliente') }}">
    <input type="text" name="nome" placeholder="Nome" required>
    <input type="text" name="telefone" placeholder="Telefone">
    <input type="text" name="local" placeholder="Local">
    <button type="submit">Cadastrar</button>
</form>

<br>

<table border="1" cellpadding="8">
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Telefone</th>
        <th>Local</th>
        <th>Dívida</th>
        <th>Ações</th>
    </tr>

    {% for cliente in clientes %}
    <tr>
        <td>{{ cliente.id }}</td>
        <td>{{ cliente.nome }}</td>
        <td>{{ cliente.telefone }}</td>
        <td>{{ cliente.local }}</td>
        <td>R$ {{ "%.2f"|format(cliente.divida or 0) }}</td>
        <td>
            <a href="{{ url_for('definir_senha_cliente', cliente_id=cliente.id) }}">
                Definir senha
            </a>
            |
            <a href="{{ url_for('excluir_cliente', id=cliente.id) }}">
                Excluir
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
