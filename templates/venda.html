{% extends 'base.html' %}

{% block conteudo %}

<h2>🛒 Nova Venda</h2>

<form method="POST">

    <!-- PRODUTO -->
    <label>Produto</label>
    <select name="produto" required>
        {% for p in produtos %}
            <option value="{{ p.id }}">
                {{ p.nome }} (R$ {{ "%.2f"|format(p.preco) }})
            </option>
        {% endfor %}
    </select>

    <!-- CLIENTE -->
    <label>Cliente</label>
    <select name="cliente" required>
        {% for c in clientes %}
            <option value="{{ c.id }}">
                {{ c.nome }}
            </option>
        {% endfor %}
    </select>

    <!-- QUANTIDADE -->
    <label>Quantidade</label>
    <input type="number" name="quantidade" required min="1">

    <!-- FORMA DE PAGAMENTO -->
    <label>Forma de pagamento</label>
    <select name="forma" required>
        <option value="dinheiro">Dinheiro</option>
        <option value="transferencia">Transferência</option>
        <option value="fiado">Fiado</option>
    </select>

    <button type="submit">Registrar Venda</button>

</form>

{% endblock %}
