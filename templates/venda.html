{% extends 'base.html' %}
{% block conteudo %}
<div class="hero">
    <div>
        <h2>Nova Venda</h2>
        <p>Finalize vendas com mais rapidez e encontre clientes por local.</p>
    </div>
    <div class="hero-badge">Filtro por local ativo</div>
</div>
<div class="card">
    <div class="form-grid">
        <div class="field">
            <label for="filtroLocal">Filtrar clientes por local</label>
            <input type="text" id="filtroLocal" placeholder="Digite cidade, bairro ou região">
            <small>O filtro ajuda a localizar rapidamente clientes por região de venda.</small>
        </div>
        <div class="field">
            <label for="limparFiltro">Ações</label>
            <button type="button" id="limparFiltro" class="btn btn-secondary">Limpar filtro</button>
        </div>
    </div>
    <form method="POST">
        <div class="form-grid">
            <div class="field">
                <label>Produto</label>
                <select name="produto" required>
                    {% for p in produtos %}
                    <option value="{{ p.id }}">{{ p.nome }} - R$ {{ "%.2f"|format(p.preco) }} (Estoque: {{ p.estoque }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="field">
                <label>Cliente</label>
                <select name="cliente" id="clienteSelect" required>
                    {% for c in clientes %}
                    <option value="{{ c.id }}" data-local="{{ (c.local or '')|lower }}">{{ c.nome }}{% if c.local %} - {{ c.local }}{% endif %}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="field"><label>Quantidade</label><input type="number" name="quantidade" min="1" required></div>
            <div class="field">
                <label>Forma de pagamento</label>
                <select name="forma" required>
                    <option value="dinheiro">Dinheiro</option>
                    <option value="transferencia">Transferência</option>
                    <option value="fiado">Fiado</option>
                </select>
            </div>
        </div>
        <button type="submit">Finalizar Venda</button>
    </form>
</div>
<script>
const filtroLocal = document.getElementById('filtroLocal');
const clienteSelect = document.getElementById('clienteSelect');
const limparFiltro = document.getElementById('limparFiltro');
const clienteOptions = Array.from(clienteSelect.options).map(opt => ({value: opt.value, text: opt.text, local: (opt.dataset.local || '')}));
function renderClientes(filtro='') {
    const termo = filtro.trim().toLowerCase();
    clienteSelect.innerHTML = '';
    const filtrados = clienteOptions.filter(opt => !termo || opt.local.includes(termo) || opt.text.toLowerCase().includes(termo));
    filtrados.forEach(opt => {
        const option = document.createElement('option');
        option.value = opt.value; option.textContent = opt.text; option.dataset.local = opt.local; clienteSelect.appendChild(option);
    });
    if (!filtrados.length) {
        const option = document.createElement('option');
        option.textContent = 'Nenhum cliente encontrado para esse local'; option.disabled = true; option.selected = true; clienteSelect.appendChild(option);
    }
}
filtroLocal?.addEventListener('input', e => renderClientes(e.target.value));
limparFiltro?.addEventListener('click', () => { filtroLocal.value = ''; renderClientes(''); filtroLocal.focus(); });
</script>
{% endblock %}
