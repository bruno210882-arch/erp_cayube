{% extends "base.html" %}
{% block conteudo %}

<h2>Venda</h2>

<input type="text" id="busca" placeholder="Buscar produto..." class="input-busca">

<div class="grid">

{% for p in produtos %}
<div class="linha-busca card">
    <strong>{{ p.nome }}</strong><br>
    R$ {{ "%.2f"|format(p.preco) }}
</div>
{% endfor %}

</div>

{% include "busca_script.html" %}

{% endblock %}
