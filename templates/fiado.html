{% extends "base.html" %}
{% block conteudo %}

<h2>Fiado</h2>

<input type="text" id="busca" placeholder="Buscar cliente ou produto..." class="input-busca">

{% for venda, cliente, produto in vendas %}
<div class="linha-busca card">
    <strong>{{ cliente.nome }}</strong><br>
    {{ produto.nome }}<br>
    R$ {{ "%.2f"|format(venda.total) }}
</div>
{% endfor %}

{% include "busca_script.html" %}

{% endblock %}
