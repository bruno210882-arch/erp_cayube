{% extends 'base.html' %}
{% block conteudo %}

<h2>💳 Vendas no Fiado</h2>

<table>
    <tr>
        <th>Cliente</th>
        <th>Produto</th>
        <th>Quantidade</th>
        <th>Valor em Aberto</th>
        <th>Receber</th>
    </tr>

    {% for venda, cliente, produto in vendas_fiado %}
    <tr>
        <td>{{ cliente.nome }}</td>
        <td>{{ produto.nome }}</td>
        <td>{{ venda.quantidade }}</td>
        <td>R$ {{ "%.2f"|format(venda.total) }}</td>
        <td>
            <form method="POST" action="{{ url_for('receber_venda', venda_id=venda.id) }}">
                <select name="forma" required>
                    <option value="dinheiro">Dinheiro</option>
                    <option value="transferencia">Transferência</option>
                </select>
                <button type="submit">Baixar</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
