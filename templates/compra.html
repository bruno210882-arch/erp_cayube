{% extends 'base.html' %}

{% block conteudo %}

<h2>Entrada de Estoque (Compra)</h2>

<form method="POST">

    <label>Produto:</label>
    <select name="produto">
        {% for p in produtos %}
            <option value="{{ p.id }}">{{ p.nome }}</option>
        {% endfor %}
    </select>

    <br><br>

    <label>Quantidade:</label>
    <input type="number" name="quantidade" required>

    <br><br>

    <label>Custo Unitário (R$):</label>
    <input type="number" step="0.01" name="custo" required>

    <br><br>

    <button type="submit">Dar Entrada</button>

</form>

{% endblock %}
