<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Área do Cliente</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #1e1e2f;
        }

        .mensagem {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .mensagem.success { background: #d4edda; color: #155724; }
        .mensagem.danger { background: #f8d7da; color: #721c24; }
        .mensagem.warning { background: #fff3cd; color: #856404; }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        input:focus {
            border-color: #1e1e2f;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 18px;
            border-radius: 8px;
            border: none;
            background: #1e1e2f;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #33334d;
        }

        .rodape {
            text-align: center;
            margin-top: 14px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Área do Cliente</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mensagem {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <label>Telefone</label>
            <input
                type="text"
                name="telefone"
                id="telefone"
                placeholder="(19) 99999-9999"
                maxlength="15"
                required
            >

            <label>Senha</label>
            <input
                type="password"
                name="senha"
                placeholder="Digite sua senha"
                required
            >

            <button type="submit">Entrar</button>
        </form>

        <div class="rodape">
            Digite apenas os números
        </div>
    </div>

    <script>
        const telefoneInput = document.getElementById("telefone");

        telefoneInput.addEventListener("input", function (e) {
            let v = e.target.value.replace(/\D/g, "");

            if (v.length > 11) {
                v = v.slice(0, 11);
            }

            if (v.length >= 11) {
                v = v.replace(/^(\d{2})(\d{5})(\d{4}).*/, "($1) $2-$3");
            } else if (v.length >= 7) {
                v = v.replace(/^(\d{2})(\d{5})/, "($1) $2");
            } else if (v.length >= 3) {
                v = v.replace(/^(\d{2})(\d+)/, "($1) $2");
            } else if (v.length > 0) {
                v = v.replace(/^(\d+)/, "($1");
            }

            e.target.value = v;
        });
    </script>
</body>
</html>
