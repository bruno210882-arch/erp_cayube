<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login ERP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="{{ url_for('manifest_erp') }}?v={{ config.get('APP_VERSION', '') }}">
    <meta name="theme-color" content="#121936">
    <link rel="apple-touch-icon" href="/static/icons/erp-192.png">
    <style>
        *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#c7d2fe 0,#eaf1ff 28%,#f4f7fb 60%,#edf2f9 100%);display:flex;align-items:center;justify-content:center;padding:26px;color:#18212f}
        .wrap{width:100%;max-width:1120px;display:grid;grid-template-columns:1.1fr .9fr;gap:24px;align-items:center}.hero{padding:28px}.hero h1{font-size:44px;margin:0 0 14px}.hero p{font-size:18px;line-height:1.6;color:#475467;margin:0 0 20px}.hero-badges{display:flex;gap:10px;flex-wrap:wrap}.badge{padding:10px 14px;background:rgba(255,255,255,.72);border:1px solid rgba(148,163,184,.24);border-radius:999px;font-weight:700}
        .login-card{background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border:1px solid rgba(226,232,240,.9);box-shadow:0 30px 60px rgba(15,23,42,.12);border-radius:28px;padding:34px}.logo-area{text-align:center;margin-bottom:18px}.logo-area img{width:min(100%,320px);max-height:180px;object-fit:contain;filter:drop-shadow(0 20px 30px rgba(30,64,175,.15))}
        h2{text-align:center;font-size:30px;margin:6px 0 8px}.subtitle{text-align:center;color:#667085;margin:0 0 22px}.field{margin-bottom:14px}.field label{display:block;font-weight:700;margin-bottom:8px}.field input{width:100%;padding:14px 15px;border:1px solid #d5deec;border-radius:16px;font-size:15px}.actions{display:grid;gap:12px;margin-top:16px}.btn{width:100%;padding:14px 18px;border:none;border-radius:16px;font-weight:800;font-size:15px;cursor:pointer;color:#fff;background:linear-gradient(135deg,#172554,#1d4ed8)} #btnInstalar{display:none;background:linear-gradient(135deg,#166534,#22c55e)}
        @media (max-width:900px){.wrap{grid-template-columns:1fr}.hero{padding:0 6px 10px}.hero h1{font-size:34px}.login-card{padding:26px}}
    </style>
</head>
<body>
<div class="wrap">
    <div class="hero">
        <h1>ERP Cayube renovado para vender mais e gerir melhor.</h1>
        <p>Controle clientes, estoque, pedidos, caixa e área do cliente com um visual mais moderno, leve e profissional.</p>
        <div class="hero-badges">
            <span class="badge">Painel gerencial</span>
            <span class="badge">Área do cliente</span>
            <span class="badge">Pronto para instalar</span>
        </div>
    </div>
    <div class="login-card">
        <div class="logo-area"><img src="{{ url_for('static', filename='logo.png') }}" alt="Logo Cayube"></div>
        <h2>Entrar no ERP</h2>
        <p class="subtitle">Acesse sua gestão com segurança.</p>
        <form method="POST">
            <div class="field"><label>Usuário</label><input type="text" name="usuario" placeholder="Digite seu usuário" required></div>
            <div class="field"><label>Senha</label><input type="password" name="senha" placeholder="Digite sua senha" required></div>
            <div class="actions">
                <button type="submit" class="btn">Entrar</button>
                <button id="btnInstalar" type="button" class="btn">Instalar ERP</button>
            </div>
        </form>
    </div>
</div>
<script>
if ("serviceWorker" in navigator) {
window.addEventListener("load", function () {
  navigator.serviceWorker.register("/service-worker.js?v={{ config.get('APP_VERSION', '') }}")
    .then(reg => reg.update())
    .catch(err => console.log("SW ERP erro:", err));
});
}
let deferredPrompt; const btnInstalar = document.getElementById("btnInstalar");
window.addEventListener("beforeinstallprompt", (e) => { e.preventDefault(); deferredPrompt = e; btnInstalar.style.display = "block"; });
btnInstalar.addEventListener("click", async () => { if (deferredPrompt) { deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; btnInstalar.style.display = "none"; } });
</script>
</body>
</html>
