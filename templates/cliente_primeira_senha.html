{% extends 'base_cliente.html' %}
{% block titulo %}Primeiro acesso{% endblock %}
{% block conteudo %}
<h2 class="page-title">Primeiro acesso</h2>
<p class="subtitle">Olá, {{ cliente.nome }}. Defina sua nova senha para continuar.</p>
<div class="card" style="max-width:520px;">
    <form method="POST">
        <div><label>Nova senha</label><input type="password" name="nova_senha" required></div>
        <div><label>Confirmar senha</label><input type="password" name="confirmar_senha" required></div>
        <button type="submit">Salvar nova senha</button>
    </form>
</div>
{% endblock %}
